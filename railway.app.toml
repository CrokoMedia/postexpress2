# ============================================
# Railway.app Configuration - Next.js App
# ============================================
# Deploy da aplicação principal (Next.js + Remotion + Chromium)
# SEM TIMEOUT LIMITS!

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/api/health"
healthcheckTimeout = 30

[env]
NODE_ENV = "production"
PORT = "3000"
HOSTNAME = "0.0.0.0"
