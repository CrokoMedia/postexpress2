# ============================================
# Railway.app Configuration - Analysis Worker
# ============================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "worker/Dockerfile"
watchPatterns = ["worker/**", "lib/**", "scripts/**"]

[deploy]
startCommand = "npx tsx analysis-worker.ts"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
